# Eval matrix: every trained model + the teacher reference.
# Each entry produces a predictions JSONL plus a row in the comparison table.

runs:
  - name: base_qwen_0p5b
    kind: base
    model_id: mlx-community/Qwen2.5-0.5B-Instruct-bf16
    temperature: 0.0
    max_tokens: 256
    use_reasoning_prompt: false

  - name: distilled_primary
    kind: lora
    model_id: mlx-community/Qwen2.5-0.5B-Instruct-bf16
    adapter_path: artifacts/runs/primary/adapter
    temperature: 0.0
    max_tokens: 256
    use_reasoning_prompt: false

  - name: distilled_ablation_direct
    kind: lora
    model_id: mlx-community/Qwen2.5-0.5B-Instruct-bf16
    adapter_path: artifacts/runs/ablation_direct_only/adapter
    temperature: 0.0
    max_tokens: 256
    use_reasoning_prompt: false

  - name: distilled_1p5b
    kind: lora
    model_id: mlx-community/Qwen2.5-1.5B-Instruct-bf16
    adapter_path: artifacts/runs/scaling_1p5b/adapter
    temperature: 0.0
    max_tokens: 256
    use_reasoning_prompt: false

  - name: distilled_1p5b_q4
    kind: base
    model_id: artifacts/runs/scaling_1p5b/fused_q4
    temperature: 0.0
    max_tokens: 256
    use_reasoning_prompt: false

  - name: distilled_3b
    kind: lora
    model_id: mlx-community/Qwen2.5-3B-Instruct-4bit
    adapter_path: artifacts/runs/scaling_3b/adapter
    temperature: 0.0
    max_tokens: 256
    use_reasoning_prompt: false

  # GPT-4o-mini reference: included here so a from-scratch re-run captures
  # it in one go. For an RPD-gated run today, prefer:
  #   uv run python scripts/04_eval_all.py \
  #     --config configs/eval_teacher_only.yaml --merge
  - name: gpt_4o_mini_reference
    kind: openai
    openai_model: gpt-4o-mini-2024-07-18
    temperature: 0.0
    max_tokens: 256
    use_reasoning_prompt: false

output_dir: reports/predictions
evaluator_dir: third_party/test-suite-sql-eval
