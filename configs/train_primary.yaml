# Primary student LoRA training config.
# Rank 16 with all decoder linears, mix of direct + reasoning traces.

base:
  model_id: mlx-community/Qwen2.5-0.5B-Instruct-bf16
  max_seq_len: 2048

traces_path: artifacts/traces/spider_train_trim.jsonl
val_split: 0.05

rank: 16
alpha: 32.0
dropout: 0.05

learning_rate: 5.0e-5
warmup_steps: 50
schedule: cosine

batch_size: 1
grad_accum: 8
# 1 epoch is enough on filtered teacher traces -- the gold-matched signal is
# strong, more epochs overfit the teacher's surface style without lifting
# execution accuracy.
epochs: 1
eval_every_steps: 250
save_every_steps: 250

seed: 42

include_reasoning_traces: true

output_dir: artifacts/runs
run_name: primary
